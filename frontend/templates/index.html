<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNIS - AI Wildfire Detection System</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="glass-bg"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-fire-alt fire-icon"></i>
                <h1>IGNIS <span>AI</span></h1>
            </div>
            <div class="system-status">
                <span id="status-text">System Active</span>
                <div class="status-indicator" id="status-pulse"></div>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- Live Feed Section -->
            <section class="feed-card glass-panel">
                <div class="panel-header">
                    <h2><i class="fas fa-video"></i> Live Detection Feed</h2>
                    <div class="feed-controls">
                        <button id="toggle-btn" class="btn primary-btn"><i class="fas fa-play"></i> Start Detection</button>
                    </div>
                </div>
                <div class="video-container">
                    <img id="video-feed" src="/video_feed" alt="Video feed loading...">
                    <div class="detection-overlay" id="overlay">
                        <span id="detection-msg">Monitoring Environment...</span>
                    </div>
                </div>
            </section>

            <!-- Sidebar / Controls -->
            <aside class="controls-sidebar">
                <div class="control-card glass-panel">
                    <h3><i class="fas fa-microchip"></i> System Health</h3>
                    <div class="status-box">
                        <div class="status-row">
                            <span>Calibration:</span>
                            <div class="progress-wrap">
                                <div id="calib-progress" class="progress-fill" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="status-row">
                            <span>Stability:</span>
                            <span id="stability-status" class="badge">Checking...</span>
                        </div>
                    </div>
                </div>

                <div class="control-card glass-panel">
                    <h3><i class="fas fa-sliders-h"></i> Settings</h3>
                    <div class="slider-group">
                        <label for="threshold">Confidence: <span id="threshold-val">0.50</span></label>
                        <input type="range" id="threshold" min="0.1" max="0.95" step="0.05" value="0.50">
                    </div>
                </div>

                <div class="alert-history-card glass-panel">
                    <div class="panel-header-inline">
                        <h3><i class="fas fa-history"></i> History</h3>
                        <button id="reset-history-btn" class="btn-text"><i class="fas fa-trash"></i> Clear</button>
                    </div>
                    <div class="history-list" id="history-list">
                        <div class="empty-state">No alerts logged yet.</div>
                    </div>
                </div>
            </aside>
        </main>

        <footer>
            <div class="footer-info">
                <p>&copy; 2026 IGNIS Wildfire Systems | 🚨 SMS & Voice Alerts Enabled</p>
            </div>
        </footer>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
